name: Smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax smoke checks
        run: npm run check:syntax
