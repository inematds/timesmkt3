<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Arial', sans-serif; }

  .ad {
    width: 1080px;
    height: 1080px;
    background: #BFD9E8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 70px 80px 60px;
    position: relative;
    overflow: hidden;
  }

  /* Background texture */
  .ad::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(44,26,14,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(44,26,14,0.06) 0%, transparent 50%);
  }

  .top-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    z-index: 1;
  }

  .tag {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #2C1A0E;
    opacity: 0.5;
    margin-bottom: 20px;
  }

  .headline {
    font-family: 'Georgia', serif;
    font-size: 62px;
    font-weight: 700;
    color: #2C1A0E;
    line-height: 1.1;
    text-align: center;
    margin-bottom: 10px;
  }

  .sub-headline {
    font-family: 'Georgia', serif;
    font-size: 28px;
    font-style: italic;
    color: #4B2E1A;
    opacity: 0.75;
  }

  /* Product image centered */
  .product-wrap {
    z-index: 1;
    position: relative;
  }
  .product-wrap img {
    height: 280px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 16px 40px rgba(44,26,14,0.25));
  }

  /* Benefits row */
  .benefits {
    display: flex;
    gap: 28px;
    z-index: 1;
    width: 100%;
  }

  .benefit-card {
    flex: 1;
    background: rgba(255,255,255,0.65);
    border-radius: 16px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.8);
  }

  .benefit-icon {
    font-size: 40px;
    margin-bottom: 14px;
    line-height: 1;
  }

  .benefit-title {
    font-size: 22px;
    font-weight: 800;
    color: #2C1A0E;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .benefit-desc {
    font-size: 16px;
    color: #4B2E1A;
    line-height: 1.5;
    font-weight: 300;
  }

  .brand {
    position: absolute;
    bottom: 24px;
    left: 60px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(44,26,14,0.3);
    z-index: 2;
  }

  .slide-number {
    position: absolute;
    bottom: 24px;
    right: 60px;
    font-size: 13px;
    color: rgba(44,26,14,0.25);
    letter-spacing: 2px;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="top-section">
    <div class="tag">Por que ela vai amar</div>
    <div class="headline">Suave. Fácil. Perfeito.</div>
    <div class="sub-headline">Para a mãe que merece o melhor café da manhã</div>
  </div>

  <div class="product-wrap">
    <img src="file:///home/nmaldaner/projetos/timesmkt/cbcc/assets/coffee_glass.png.jpeg" alt="Cold Brew Glass" />
  </div>

  <div class="benefits">
    <div class="benefit-card">
      <div class="benefit-icon">✨</div>
      <div class="benefit-title">Sem Amargura</div>
      <div class="benefit-desc">Sabor suave do primeiro ao último gole</div>
    </div>
    <div class="benefit-card">
      <div class="benefit-icon">🧊</div>
      <div class="benefit-title">Baixa Acidez</div>
      <div class="benefit-desc">Gentil para o estômago, intenso no sabor</div>
    </div>
    <div class="benefit-card">
      <div class="benefit-icon">☕</div>
      <div class="benefit-title">Pronto Já</div>
      <div class="benefit-desc">Sem espera, sem complicação, só prazer</div>
    </div>
  </div>

  <div class="brand">Cold Brew Coffee Co.</div>
  <div class="slide-number">04 / 05</div>
</div>
</body>
</html>
