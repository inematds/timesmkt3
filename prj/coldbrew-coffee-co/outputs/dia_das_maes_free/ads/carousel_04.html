<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Carousel 04 - Conexão</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    overflow: hidden;
    background: #2C1A0E;
  }

  /* Top photo strip */
  .photo-strip {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 520px;
    overflow: hidden;
  }

  .photo-strip .bg {
    width: 100%;
    height: 100%;
    background-image: url('file:///home/nmaldaner/projetos/timesmkt/cbcc/outputs/dia_das_maes_free/ads/pexels_cozinha.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.65) saturate(0.85);
  }

  .photo-strip::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(to bottom, transparent, #2C1A0E);
  }

  /* Bottom content */
  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 580px;
    display: flex;
    padding: 40px 80px 80px 80px;
    flex-direction: column;
    justify-content: flex-end;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #F5A623;
    margin-bottom: 20px;
  }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 68px;
    font-weight: 900;
    color: #F9F5F0;
    line-height: 1.08;
    margin-bottom: 28px;
  }

  h2 span {
    color: #BFD9E8;
  }

  .cards {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }

  .card {
    flex: 1;
    background: rgba(249, 245, 240, 0.06);
    border: 1px solid rgba(245, 166, 35, 0.2);
    border-radius: 16px;
    padding: 20px 22px;
  }

  .card-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: #F5A623;
    line-height: 1;
    margin-bottom: 8px;
  }

  .card-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #BFD9E8;
    line-height: 1.4;
  }

  .logo {
    position: absolute;
    top: 50px;
    right: 60px;
    z-index: 20;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: #F5A623;
    letter-spacing: 1px;
  }

  .slide-indicator {
    position: absolute;
    top: 60px;
    left: 60px;
    display: flex;
    gap: 8px;
    z-index: 20;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(249,245,240,0.3);
  }
  .dot.active {
    background: #F5A623;
    width: 24px;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="photo-strip">
    <div class="bg"></div>
  </div>

  <div class="logo">
    <div class="logo-text">Cold Brew Co.</div>
  </div>

  <div class="slide-indicator">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
  </div>

  <div class="content">
    <div class="eyebrow">Momentos que ficam</div>
    <h2>Na cozinha,<br><span>lado a lado.</span></h2>

    <div class="cards">
      <div class="card">
        <div class="card-num">24h</div>
        <div class="card-label">de extração lenta<br>para o melhor sabor</div>
      </div>
      <div class="card">
        <div class="card-num">0g</div>
        <div class="card-label">de açúcar adicionado.<br>Só café de verdade.</div>
      </div>
      <div class="card">
        <div class="card-num">∞</div>
        <div class="card-label">Momentos juntas<br>pra celebrar.</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
