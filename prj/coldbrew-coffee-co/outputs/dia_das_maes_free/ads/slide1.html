<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    font-family: 'Inter', sans-serif;
    background-image: url('file:///home/nmaldaner/projetos/timesmkt/cbcc/outputs/dia_das_maes_free/img/ChatGPT%20Image%2027%20de%20mar.%20de%202026%2C%2000_51_06.png');
    background-size: cover;
    background-position: center;
  }

  /* Gradiente: escuro no topo e bottom, aberto no centro */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(44, 26, 14, 0.75) 0%,
      rgba(44, 26, 14, 0.15) 40%,
      rgba(44, 26, 14, 0.10) 60%,
      rgba(44, 26, 14, 0.80) 100%
    );
  }

  /* Tag topo */
  .top-tag {
    position: absolute;
    top: 54px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }

  .tag-line {
    width: 60px;
    height: 1.5px;
    background: #F5A623;
    opacity: 0.8;
  }

  .tag-label {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #F5A623;
  }

  /* Texto principal — posicionado no rodapé */
  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 72px 80px;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #F5A623;
    margin-bottom: 16px;
    opacity: 0.95;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 78px;
    font-weight: 900;
    line-height: 1.05;
    color: #F9F5F0;
    margin-bottom: 20px;
    text-shadow: 0 2px 24px rgba(44,26,14,0.5);
  }

  .subtext {
    font-family: 'Inter', sans-serif;
    font-size: 30px;
    font-weight: 300;
    color: #F9F5F0;
    opacity: 0.90;
    letter-spacing: 0.5px;
  }

  /* Slide counter */
  .counter {
    position: absolute;
    bottom: 44px;
    right: 72px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: #F9F5F0;
    opacity: 0.5;
    letter-spacing: 2px;
  }

  /* Logo top-right */
  .logo {
    position: absolute;
    top: 48px;
    right: 64px;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: #F9F5F0;
    opacity: 0.75;
    letter-spacing: 1px;
    text-align: right;
    line-height: 1.3;
  }
  .logo span {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #F5A623;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="overlay"></div>

  <div class="top-tag">
    <div class="tag-line"></div>
    <div class="tag-label">Dia das Mães</div>
    <div class="tag-line"></div>
  </div>

  <div class="logo">
    Cold Brew Co.
    <span>Since 2018</span>
  </div>

  <div class="content">
    <div class="eyebrow">Uma homenagem especial</div>
    <div class="headline">O presente<br>que ela<br>merece</div>
    <div class="subtext">Feito para quem você mais ama ☕</div>
  </div>

  <div class="counter">01 / 05</div>
</div>
</body>
</html>
