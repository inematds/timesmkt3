<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;600&display=swap');

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    font-family: 'Inter', sans-serif;
    background-image: url('file:///home/nmaldaner/projetos/timesmkt/cbcc/outputs/dia_das_maes_free/img/ChatGPT%20Image%2026%20de%20mar.%20de%202026%2C%2023_57_47.png');
    background-size: cover;
    background-position: center top;
  }

  /* Gradiente: forte na esquerda, aberto na direita */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      rgba(44, 26, 14, 0.82) 0%,
      rgba(44, 26, 14, 0.50) 45%,
      rgba(44, 26, 14, 0.08) 100%
    );
  }

  /* Conteúdo: coluna esquerda */
  .content {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 560px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 64px;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #F5A623;
    margin-bottom: 28px;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 700;
    font-style: italic;
    line-height: 1.08;
    color: #F9F5F0;
    margin-bottom: 32px;
    text-shadow: 0 2px 20px rgba(44,26,14,0.4);
  }

  .divider {
    width: 48px;
    height: 2px;
    background: #F5A623;
    margin-bottom: 28px;
  }

  .subtext {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 300;
    line-height: 1.55;
    color: #F9F5F0;
    opacity: 0.88;
  }

  /* Badge emocional */
  .badge {
    position: absolute;
    bottom: 72px;
    left: 64px;
    background: rgba(245, 166, 35, 0.18);
    border: 1px solid rgba(245, 166, 35, 0.45);
    border-radius: 40px;
    padding: 12px 28px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #F5A623;
    letter-spacing: 1px;
  }

  .counter {
    position: absolute;
    bottom: 44px;
    right: 64px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: #F9F5F0;
    opacity: 0.45;
    letter-spacing: 2px;
  }

  /* Logo */
  .logo {
    position: absolute;
    top: 52px;
    right: 60px;
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 700;
    color: #F9F5F0;
    opacity: 0.70;
    text-align: right;
    line-height: 1.3;
  }
  .logo span {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #F5A623;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="overlay"></div>

  <div class="content">
    <div class="eyebrow">Para a sua mãe</div>
    <div class="headline">Ela ensinou<br>tudo</div>
    <div class="divider"></div>
    <div class="subtext">Até o café<br>perfeito.</div>
  </div>

  <div class="badge">Amor que se serve em cada gole</div>

  <div class="logo">
    Cold Brew Co.
    <span>Since 2018</span>
  </div>

  <div class="counter">02 / 05</div>
</div>
</body>
</html>
