<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 02 - Emocional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; }

  .slide {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background: #1A0F07;
  }

  /* Full bg photo top half */
  .bg-photo {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1100px;
    overflow: hidden;
  }

  .bg-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    filter: brightness(0.55) saturate(0.75);
  }

  .bg-photo::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 400px;
    background: linear-gradient(to bottom, transparent, #1A0F07);
  }

  /* Bottom dark section */
  .bottom-section {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 920px;
    background: #2C1A0E;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 80px;
  }

  .bottom-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, #F5A623, transparent);
  }

  /* Center floating text */
  .center-text {
    position: absolute;
    top: 700px;
    left: 0;
    right: 0;
    text-align: center;
    padding: 0 80px;
    z-index: 20;
  }

  .quote-em {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    font-style: italic;
    color: #BFD9E8;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 96px;
    font-weight: 900;
    color: #F9F5F0;
    line-height: 1.0;
    text-shadow: 0 4px 30px rgba(0,0,0,0.7);
  }

  h1 em {
    font-style: italic;
    color: #F5A623;
  }

  /* Bottom content */
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #F5A623;
    margin-bottom: 28px;
  }

  .body-text {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    color: #F9F5F0;
    line-height: 1.15;
    margin-bottom: 36px;
  }

  .body-text span {
    color: #BFD9E8;
    font-style: italic;
    font-weight: 700;
  }

  .desc {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: rgba(249,245,240,0.65);
    line-height: 1.6;
    margin-bottom: 56px;
    max-width: 760px;
  }

  .cta-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .cta-btn {
    background: #F5A623;
    color: #2C1A0E;
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.5px;
    padding: 22px 52px;
    border-radius: 100px;
    box-shadow: 0 8px 30px rgba(245,166,35,0.35);
  }

  .cta-link {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    color: #BFD9E8;
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  /* Top bar */
  .top-bar {
    position: absolute;
    top: 80px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 60px;
    z-index: 30;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #F5A623;
    letter-spacing: 2px;
  }

  .logo-sub {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: rgba(249,245,240,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* Amber accent bar */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 80px;
    width: 5px;
    height: 100px;
    background: #F5A623;
    border-radius: 0 4px 4px 0;
    z-index: 30;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-photo">
    <img src="file:///home/nmaldaner/projetos/timesmkt/cbcc/outputs/dia_das_maes_free/ads/pexels_abraco.jpg" alt="Abraço">
  </div>

  <div class="accent-bar"></div>

  <div class="top-bar">
    <div>
      <div class="logo-text">Cold Brew Co.</div>
      <div class="logo-sub">Dia das Mães 2026</div>
    </div>
  </div>

  <div class="center-text">
    <div class="quote-em">ela sempre esteve lá.</div>
    <h1>Agora é<br>a sua <em>vez.</em></h1>
  </div>

  <div class="bottom-section">
    <div class="eyebrow">Um presente que ela vai amar</div>
    <div class="body-text">Cold Brew Co.<br><span>Premium.</span><br>Para mamães.</div>
    <p class="desc">Brewed slow. Served cold. Perfeito pra começar o dia do lado de quem você ama.</p>
    <div class="cta-row">
      <div class="cta-btn">Compre Agora</div>
      <div class="cta-link">Ver coleção ›</div>
    </div>
  </div>
</div>
</body>
</html>
