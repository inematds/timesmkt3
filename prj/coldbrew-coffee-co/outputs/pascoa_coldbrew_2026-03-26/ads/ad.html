<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Cold Brew Coffee Co. — Páscoa 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ad-container lifestyle">

    <!-- Full-bleed background -->
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <!-- Decorative Easter egg shapes (CSS only) -->
    <div class="egg egg-1"></div>
    <div class="egg egg-2"></div>
    <div class="egg egg-3"></div>
    <div class="egg egg-4"></div>
    <div class="egg egg-5"></div>

    <!-- Ad Content -->
    <div class="content">

      <!-- Brand + Headline -->
      <div class="top-section">
        <div class="brand-name">Cold Brew Coffee Co.</div>
        <div class="pascoa-badge">✦ Páscoa Edition ✦</div>
        <div class="headline">Easter,<br>Upgraded.</div>
      </div>

      <!-- Product focal point -->
      <div class="product-section">
        <div class="product-frame">
          <img
            class="product"
            src="../../../assets/coffee_can.png.jpeg"
            alt="Cold Brew Coffee Can"
          />
        </div>
      </div>

      <!-- Subtext + CTA -->
      <div class="bottom-section">
        <div class="subtext">Smooth cold brew for your best Easter morning.</div>
        <button class="cta">Shop Now</button>
      </div>

    </div>
  </div>
</body>
</html>
