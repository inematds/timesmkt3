<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1080"/>
  <title>Cold Brew Coffee Co. — Instagram Ad</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="ad-container lifestyle">

  <!-- Background image -->
  <img class="ad-background" src="../../../assets/background_blur.png" alt="" />

  <div class="ad-content">

    <!-- Top: Headline + Subtext -->
    <div class="top-block">
      <div class="headline">Your Morning,<br>Upgraded.</div>
      <div class="subtext">Smooth cold brew energy.<br>Zero bitterness.</div>
    </div>

    <!-- Center: Product in photograph frame -->
    <div class="product-frame">
      <div class="product-square">
        <img src="../../../assets/product_square.png" alt="Cold Brew Coffee Co. Can" />
      </div>
    </div>

    <!-- Bottom: Brand + CTA -->
    <div class="bottom-block">
      <div class="brand-name">Cold Brew Coffee Co.</div>
      <a class="cta" href="#">Shop Now</a>
    </div>

  </div>
</div>

</body>
</html>
