<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <title>Cold Brew Coffee Co. — Instagram Ad</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ad-container lifestyle" style="background-image: url('lifestyle_morning.png')">
    <div class="content-wrapper">

      <!-- Top: Headline + Subtext -->
      <div class="text-block">
        <div class="headline">Upgrade Your<br/>Morning</div>
        <div class="accent-bar"></div>
        <div class="subtext">Smooth cold brew energy with zero bitterness</div>
      </div>

      <!-- Center: Product Image -->
      <div class="product-image-wrapper">
        <div class="product-glow"></div>
        <img src="coffee_can.png" alt="Cold Brew Coffee Can" />
      </div>

      <!-- Bottom: CTA -->
      <div class="bottom-section">
        <button class="cta">Shop Now</button>
        <div class="brand-tag">Cold Brew Coffee Co.</div>
      </div>

    </div>
  </div>
</body>
</html>
